<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Family Sick Tracker</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;--surface:#17171e;--border:#252530;
  --txt:#e8e6f0;--muted:#5a5a72;--dim:#2a2a38;
  --tylenol:#7ee8a2;--motrin:#f5a623;--zyrtec:#a78bfa;
  --red:#f07167;--now:#fff;
  --today-accent:rgba(127,232,162,.025);
  --tmw-accent:rgba(100,110,180,.018);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow:hidden}

/* ─── LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ─── HEADER ─── */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;z-index:20
}
#header h1{font-size:.95rem;font-weight:600;color:var(--txt);letter-spacing:-.01em}
#add-patient-btn{
  padding:7px 13px;background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap
}
#add-patient-btn:active{background:var(--dim);color:var(--txt)}

/* ─── DAY BANNER ─── */
#day-banner{
  display:flex;flex-shrink:0;background:var(--bg);
  border-bottom:1px solid var(--border);z-index:14
}
.day-banner-spacer{width:52px;flex-shrink:0}
.day-banner-today,.day-banner-tmw{
  flex:1;text-align:center;padding:5px 4px;
  font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase
}
.day-banner-today{color:var(--tylenol);border-left:1px solid var(--border)}
.day-banner-tmw{color:var(--muted);border-left:1px solid var(--border)}

/* ─── GRID ─── */
#grid-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
#col-headers{
  display:flex;flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border);z-index:15
}
.col-header-time{width:52px;flex-shrink:0}
.col-header-patient{
  flex:1;text-align:center;padding:8px 4px 6px;
  font-size:.68rem;font-weight:600;letter-spacing:.07em;
  color:var(--muted);cursor:pointer;position:relative;min-width:90px;
  display:flex;flex-direction:column;align-items:center;gap:1px
}
.col-header-patient.today-col{border-left:1px solid var(--border)}
.col-header-patient.tmw-col{border-left:1px solid var(--border);color:#3a3a55}
.col-header-patient:active{background:var(--dim)}
.col-hdr-name{color:inherit}

#grid-body{flex:1;overflow-y:auto;overflow-x:auto;position:relative;-webkit-overflow-scrolling:touch}
#grid-inner{position:relative}

.slot-row{display:flex;border-bottom:1px solid #1a1a24;min-height:44px;position:relative}
.slot-row.overnight{background:rgba(80,70,160,.025)}
.slot-row.hour-boundary{border-bottom-color:var(--border)}

.time-label{
  width:52px;flex-shrink:0;padding:4px 8px 0;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  position:sticky;left:0;background:var(--bg);z-index:5;
  display:flex;align-items:flex-start;justify-content:flex-end
}
.time-label .moon{font-size:8px;margin-left:2px;opacity:.4}

.slot-cell{
  flex:1;min-height:44px;min-width:90px;
  padding:3px 4px;display:flex;flex-wrap:wrap;align-content:flex-start;
  gap:3px;cursor:pointer;position:relative
}
.slot-cell.today-cell{
  border-left:1px solid var(--border);background:var(--today-accent)
}
.slot-cell.tmw-cell{
  border-left:1px solid #1a1a24;background:var(--tmw-accent)
}
.slot-cell:active{background:rgba(255,255,255,.04)}

/* day boundary between patient groups */
.slot-cell.day-start{border-left:1px solid var(--border)}

/* ─── CHIPS ─── */
.chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500;
  white-space:nowrap;cursor:pointer;user-select:none;line-height:1.4
}
.chip.logged{color:#0f0f13}
.chip.available{
  background:transparent;border:1.5px dashed;
  animation:pulse-chip 1.8s ease-in-out infinite
}
.chip.cooling{
  background:#1e1e2c;border:1px solid var(--border);
  color:var(--muted);cursor:default
}
.chip.ghost{
  background:transparent;border:1px dashed #2a2a3a;
  color:#3a3a52;font-size:9.5px
}
.chip.maxed{
  background:transparent;border:1px solid var(--red);
  color:var(--red);font-size:9.5px
}
/* rotation schedule chips */
.chip.sched{background:transparent;border:1.5px solid;opacity:.65;font-size:10px}
.chip.sched.cond{border-style:dashed;opacity:.32;font-size:9.5px}
.chip.sched.now-due{opacity:.9;animation:pulse-chip 1.8s ease-in-out infinite}
@keyframes pulse-chip{
  0%,100%{opacity:.55;box-shadow:0 0 0 0 currentColor}
  50%{opacity:1;box-shadow:0 0 8px 1px currentColor}
}

/* ─── NOW LINE ─── */
#now-line{
  position:absolute;left:0;right:0;height:2px;
  background:var(--now);z-index:10;pointer-events:none
}
#now-dot{width:8px;height:8px;border-radius:50%;background:var(--now);position:absolute;left:46px;top:-3px}
#now-label{position:absolute;right:4px;top:-9px;font-family:'DM Mono',monospace;font-size:9px;color:var(--now);opacity:.6}

/* ─── USER OVERLAY ─── */
#user-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:100;padding:24px
}
#user-overlay h2{font-size:1.15rem;font-weight:600;color:var(--txt)}
#user-overlay p{font-size:.82rem;color:var(--muted);text-align:center}
.user-btn{
  width:100%;max-width:280px;padding:18px;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  color:var(--txt);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer
}
.user-btn:active{background:var(--dim)}

/* ─── BOTTOM SHEET ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end}
#modal-overlay.open{display:flex}
#modal-sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 36px;max-height:80vh;overflow-y:auto;border-top:1px solid var(--border)}
#modal-handle{width:36px;height:4px;border-radius:2px;background:var(--dim);margin:0 auto 18px}
#modal-title{font-size:1rem;font-weight:600;margin-bottom:3px}
#modal-subtitle{font-size:.8rem;color:var(--muted);margin-bottom:16px;font-family:'DM Mono',monospace}
.who-row{display:flex;gap:8px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.who-btn{
  flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:.85rem;cursor:pointer;text-align:center;transition:all .15s
}
.who-btn.active{border-color:var(--tylenol);color:var(--txt);background:var(--dim)}
.med-option{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 12px;border:1px solid var(--border);border-radius:12px;
  margin-bottom:8px;cursor:pointer;background:var(--bg);transition:background .12s
}
.med-option:active{background:var(--dim)}
.med-option.unavailable{opacity:.45;cursor:default}
.med-name{font-size:.95rem;font-weight:600}
.med-dose{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);margin-top:2px}
.med-status{font-size:.78rem;text-align:right;font-family:'DM Mono',monospace}
.med-status.ok{color:var(--tylenol)}
.med-status.warn{color:var(--motrin)}
.med-status.bad{color:var(--red)}

/* ─── DOSE DETAIL ─── */
#dose-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:55;display:none;align-items:flex-end}
#dose-modal-overlay.open{display:flex}
#dose-sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 36px;border-top:1px solid var(--border)}
#dose-info{margin-bottom:20px}
#dose-info .label{font-size:.7rem;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
#dose-info .value{font-size:.95rem;font-weight:500;margin-bottom:14px}
#undo-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--red);border-radius:12px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer}
#undo-btn:disabled{opacity:.25;cursor:default}
#close-dose-btn{width:100%;padding:14px;background:var(--dim);border:none;border-radius:12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;margin-top:8px}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:#22222e;border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;font-size:.85rem;color:var(--txt);
  z-index:90;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap
}
#toast.show{opacity:1}

/* ─── WIDGET MODE ─── */
body.widget{overflow:auto}
body.widget #app{height:auto;overflow:auto}
body.widget #header,body.widget #day-banner{display:none}
body.widget #col-headers{position:sticky;top:0}
#widget-tap-target{position:fixed;inset:0;z-index:1;cursor:pointer;display:none}
body.widget #widget-tap-target{display:block}
</style>
</head>
<body>

<div id="user-overlay" style="display:none">
  <h2>Who are you?</h2>
  <p>Saved to this device</p>
  <button class="user-btn" onclick="setUser('Trammy')">Trammy</button>
  <button class="user-btn" onclick="setUser('Thai')">Thai</button>
</div>

<div id="app">
  <div id="header">
    <h1>🩹 Sick Tracker</h1>
    <button id="add-patient-btn" onclick="openAddPatient()">+ Patient</button>
  </div>

  <div id="day-banner">
    <div class="day-banner-spacer"></div>
    <!-- filled by renderDayBanner -->
  </div>

  <div id="grid-wrapper">
    <div id="col-headers">
      <div class="col-header-time"></div>
      <!-- patient columns rendered here -->
    </div>
    <div id="grid-body">
      <div id="grid-inner">
        <div id="now-line"><div id="now-dot"></div><div id="now-label"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Log Dose Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-sheet">
    <div id="modal-handle"></div>
    <div id="modal-title"></div>
    <div id="modal-subtitle"></div>
    <div class="who-row" id="who-row"></div>
    <div id="med-list"></div>
  </div>
</div>

<!-- Dose Detail Modal -->
<div id="dose-modal-overlay" onclick="closeDoseModal(event)">
  <div id="dose-sheet">
    <div id="modal-handle" style="width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px"></div>
    <div id="dose-info"></div>
    <button id="undo-btn" onclick="undoDose()">Undo this dose</button>
    <button id="close-dose-btn" onclick="closeDoseModal()">Close</button>
  </div>
</div>

<div id="toast"></div>
<div id="widget-tap-target" onclick="window.location.href=window.location.href.replace('?widget=true','')"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, remove, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA-ViwbyagAh8PrHNDhWaD925y92klNjSc",
  authDomain: "family-sick-tracker.firebaseapp.com",
  databaseURL: "https://family-sick-tracker-default-rtdb.firebaseio.com",
  projectId: "family-sick-tracker",
  storageBucket: "family-sick-tracker.firebasestorage.app",
  messagingSenderId: "236213895069",
  appId: "1:236213895069:web:550ccc6f65355ea9d4b974"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SLOT_H = 44;
const SLOT_MS = 30 * 60 * 1000;
const SLOTS_PER_DAY = 48;
const USERS = ['Trammy', 'Thai'];
const INITIAL_PATIENTS = {
  jack: {
    name: 'Jack', type: 'infant', weight_lbs: 17.5, age_months: 11, active: true,
    meds: {
      tylenol: { name:'Tylenol', dose_ml:3.75, interval_hours:4,  max_per_24h:5, color:'#7ee8a2' },
      motrin:  { name:'Motrin',  dose_ml:2,    interval_hours:6,  max_per_24h:4, color:'#f5a623' },
      zyrtec:  { name:'Zyrtec',  dose_ml:2.5,  interval_hours:24, max_per_24h:1, color:'#a78bfa' },
    }
  }
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let patients = {};
let doses = {};
let currentUser = localStorage.getItem('sick-tracker-user');
let modalCtx = null;
let doseCtx = null;
let widgetMode = new URLSearchParams(location.search).has('widget');

// ─── TIME UTILS ───────────────────────────────────────────────────────────────
function getDayStart(day) {
  const d = day === 'tomorrow' ? new Date(Date.now() + 86400000) : new Date();
  d.setHours(0, 0, 0, 0);
  return d.getTime();
}
function slotMs(i, day) { return getDayStart(day || 'today') + i * SLOT_MS; }
function msToSlot(ms, day) { return (ms - getDayStart(day || 'today')) / SLOT_MS; }
function fmt(ms) {
  const d = new Date(ms);
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')}${ap}`;
}
function fmtDuration(ms) {
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function slotLabel(i, day) {
  const d = new Date(slotMs(i, day || 'today'));
  const h = d.getHours(), m = d.getMinutes();
  if (m !== 0) return '';
  const ap = h >= 12 ? 'pm' : 'am';
  return `${h % 12 || 12}${ap}`;
}
function isOvernight(i, day) {
  const h = new Date(slotMs(i, day || 'today')).getHours();
  return h >= 22 || h < 6;
}

// ─── MED LOGIC ────────────────────────────────────────────────────────────────
function getPatientDoses(pid) {
  return Object.entries(doses[pid] || {}).map(([k, d]) => ({ key: k, ...d }));
}

function medStatus(pid, medKey, atMs) {
  if (atMs === undefined) atMs = Date.now();
  const pat = patients[pid];
  if (!pat) return { s: 'unknown' };
  const med = pat.meds[medKey];
  if (!med) return { s: 'unknown' };
  const intervalMs = med.interval_hours * 3600000;
  const allDoses = getPatientDoses(pid).filter(d => d.med === medKey);
  const before = allDoses.filter(d => d.time <= atMs).sort((a, b) => b.time - a.time);
  const in24h = before.filter(d => d.time >= atMs - 86400000);
  if (in24h.length >= med.max_per_24h) return { s: 'maxed' };
  if (!before.length) return { s: 'available' };
  const last = before[0];
  const nextAvail = last.time + intervalMs;
  if (nextAvail <= atMs) return { s: 'available' };
  return { s: 'cooling', nextAvail, remaining: nextAvail - atMs, last };
}

function slotDoses(pid, slotIndex, day) {
  const start = slotMs(slotIndex, day), end = start + SLOT_MS;
  return getPatientDoses(pid).filter(d => d.time >= start && d.time < end);
}

function nextProjected(pid, medKey) {
  const st = medStatus(pid, medKey);
  if (st.s === 'available') return Date.now();
  if (st.s === 'cooling') return st.nextAvail;
  return null;
}

// ─── ROTATION SCHEDULE ───────────────────────────────────────────────────────
// Builds the fever-rotation plan from the last logged Motrin dose:
//   Motrin every 6h, Tylenol 3h offset every 6h, Zyrtec daily at 10am.
//   Overnight slots (10pm–7am) are marked conditional (💤 if wakes).
function isNightTime(ms) {
  const h = new Date(ms).getHours();
  return h >= 22 || h < 7;
}
function nextDailyAt(hour) {
  const d = new Date(); d.setHours(hour, 0, 0, 0);
  if (d.getTime() <= Date.now()) d.setDate(d.getDate() + 1);
  return d.getTime();
}
function alreadyLogged(allDoses, medKey, targetTime) {
  const WIN = 25 * 60 * 1000; // ±25 min window
  return allDoses.some(d => d.med === medKey && Math.abs(d.time - targetTime) < WIN);
}
function projectSchedule(pid) {
  const pat = patients[pid];
  if (!pat) return [];
  const allDoses = getPatientDoses(pid);
  const motrinDoses = allDoses.filter(d => d.med === 'motrin').sort((a,b) => b.time - a.time);
  const now = Date.now();
  const horizon = now + 40 * 3600000;
  const scheduled = [];

  // Motrin/Tylenol rotation — only fires when there's a logged Motrin to anchor from
  if (motrinDoses.length) {
    const anchor = motrinDoses[0].time;
    for (let t = anchor + 6*3600000; t <= horizon; t += 6*3600000) {
      if (!alreadyLogged(allDoses, 'motrin', t))
        scheduled.push({ time:t, medKey:'motrin', cond:isNightTime(t) });
    }
    for (let t = anchor + 3*3600000; t <= horizon; t += 6*3600000) {
      if (!alreadyLogged(allDoses, 'tylenol', t))
        scheduled.push({ time:t, medKey:'tylenol', cond:isNightTime(t) });
    }
  }

  // Zyrtec: ALWAYS daily at 10am — independent of whether rotation anchor exists
  if (pat.meds['zyrtec']) {
    [nextDailyAt(10), nextDailyAt(10) + 86400000].forEach(t => {
      if (t <= horizon && !alreadyLogged(allDoses, 'zyrtec', t))
        scheduled.push({ time:t, medKey:'zyrtec', cond:false });
    });
  }

  return scheduled.sort((a,b) => a.time - b.time);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderDayBanner();
  renderHeaders();
  renderGrid();
  updateNowLine();
}

function getActivePats() {
  return Object.entries(patients).filter(([, p]) => p.active);
}

function renderDayBanner() {
  const banner = document.getElementById('day-banner');
  const pats = getActivePats();
  if (!pats.length) { banner.innerHTML = '<div class="day-banner-spacer"></div>'; return; }
  // One today + one tomorrow section per patient
  let html = '<div class="day-banner-spacer"></div>';
  pats.forEach(() => {
    html += '<div class="day-banner-today">Today</div>';
    html += '<div class="day-banner-tmw">Tomorrow</div>';
  });
  banner.innerHTML = html;
}

function renderHeaders() {
  const hdrs = document.getElementById('col-headers');
  const pats = getActivePats();
  hdrs.innerHTML = '<div class="col-header-time"></div>' +
    pats.flatMap(([pid, p]) => [
      `<div class="col-header-patient today-col" data-pid="${pid}" data-day="today">
        <span class="col-hdr-name">${p.name.toUpperCase()}</span>
      </div>`,
      `<div class="col-header-patient tmw-col" data-pid="${pid}" data-day="tomorrow">
        <span class="col-hdr-name">${p.name.toUpperCase()}</span>
      </div>`
    ]).join('');
}

function renderGrid() {
  const body = document.getElementById('grid-inner');
  const nowLine = document.getElementById('now-line');
  body.innerHTML = '';
  body.appendChild(nowLine);

  const pats = getActivePats();
  // precompute schedule once per patient so it's not recalculated per cell
  const schedByPid = {};
  pats.forEach(([pid]) => { schedByPid[pid] = projectSchedule(pid); });

  const startSlot = widgetMode ? Math.max(0, Math.floor(msToSlot(Date.now(), 'today')) - 1) : 0;
  const endSlot = widgetMode ? startSlot + 8 : SLOTS_PER_DAY;

  for (let i = startSlot; i < endSlot; i++) {
    const row = document.createElement('div');
    row.className = 'slot-row' +
      (isOvernight(i, 'today') ? ' overnight' : '') +
      (i % 2 === 0 ? ' hour-boundary' : '');
    row.style.height = SLOT_H + 'px';

    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    const labelText = slotLabel(i, 'today');
    lbl.innerHTML = labelText
      ? labelText + (isOvernight(i, 'today') ? '<span class="moon">🌙</span>' : '')
      : '';
    row.appendChild(lbl);

    pats.forEach(([pid, pat], patIdx) => {
      ['today', 'tomorrow'].forEach(day => {
        const cell = document.createElement('div');
        const isToday = day === 'today';
        cell.className = `slot-cell ${isToday ? 'today-cell' : 'tmw-cell'}`;
        // left border between patient groups
        if (!isToday && patIdx > 0) cell.classList.add('day-start');
        cell.dataset.pid = pid;
        cell.dataset.slot = i;
        cell.dataset.day = day;

        const logged = slotDoses(pid, i, day);
        logged.forEach(d => {
          const med = pat.meds[d.med];
          if (!med) return;
          const chip = document.createElement('div');
          chip.className = 'chip logged';
          chip.style.background = med.color;
          chip.textContent = `${med.name} ${med.dose_ml}ml`;
          chip.dataset.doseKey = d.key;
          chip.addEventListener('click', e => { e.stopPropagation(); openDoseDetail(pid, d.key, d); });
          cell.appendChild(chip);
        });

        if (logged.length === 0) {
          const sched = schedByPid[pid];
          const hasRotation = sched.some(s => s.medKey === 'motrin' || s.medKey === 'tylenol');

          // draw scheduled/rotation chips that land in this slot
          sched.forEach(s => {
            const projSlot = msToSlot(s.time, day);
            if (Math.floor(projSlot) !== i) return;
            if (projSlot < 0 || projSlot >= SLOTS_PER_DAY) return;
            const slotStart = slotMs(i, day);
            if (slotStart < Date.now() - SLOT_MS) return;
            const med = pat.meds[s.medKey];
            if (!med) return;
            const nowDue = isToday && slotStart <= Date.now() && Date.now() < slotStart + SLOT_MS;
            const chip = document.createElement('div');
            chip.className = 'chip sched' + (s.cond ? ' cond' : '') + (nowDue ? ' now-due' : '');
            chip.style.color = med.color;
            chip.style.borderColor = med.color;
            chip.textContent = (s.cond ? '💤 ' : '') + `${med.name} ${med.dose_ml}ml`;
            chip.addEventListener('click', e => { e.stopPropagation(); openModal(pid, i, day); });
            cell.appendChild(chip);
          });

          // ghost chips for Motrin/Tylenol only when no rotation anchor yet (no Motrin logged)
          // Zyrtec is already handled above via schedule — never show it as a ghost here
          if (!hasRotation) {
            ['motrin', 'tylenol'].forEach(medKey => {
              const med = pat.meds[medKey];
              if (!med) return;
              const projected = nextProjected(pid, medKey);
              if (projected === null) return;
              const projSlot = msToSlot(projected, day);
              if (Math.floor(projSlot) !== i) return;
              const slotStart = slotMs(i, day);
              if (slotStart < Date.now() - SLOT_MS) return;
              const isCurrent = isToday && slotStart <= Date.now() && Date.now() < slotStart + SLOT_MS;
              const ghost = document.createElement('div');
              ghost.className = isCurrent ? 'chip available' : 'chip ghost';
              if (isCurrent) { ghost.style.color = med.color; ghost.style.borderColor = med.color; }
              ghost.textContent = `${med.name} ${med.dose_ml}ml`;
              ghost.style.pointerEvents = 'none';
              cell.appendChild(ghost);
            });
          }
        }

        cell.addEventListener('click', () => openModal(pid, i, day));
        row.appendChild(cell);
      });
    });

    body.appendChild(row);
  }

  if (!widgetMode && !renderGrid._scrolled) {
    renderGrid._scrolled = true;
    setTimeout(scrollToNow, 50);
  }
}

function updateNowLine() {
  const nowLine = document.getElementById('now-line');
  const nowLabel = document.getElementById('now-label');
  const nowSlot = msToSlot(Date.now(), 'today');
  if (nowSlot < 0 || nowSlot >= SLOTS_PER_DAY) { nowLine.style.display = 'none'; return; }
  nowLine.style.display = 'block';
  nowLine.style.top = (nowSlot * SLOT_H) + 'px';
  nowLabel.textContent = fmt(Date.now());
}

function scrollToNow() {
  const body = document.getElementById('grid-body');
  const nowSlot = msToSlot(Date.now(), 'today');
  const targetY = (nowSlot * SLOT_H) - (body.clientHeight / 2);
  body.scrollTop = Math.max(0, targetY);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(pid, slotIndex, day) {
  const pat = patients[pid];
  if (!pat) return;
  const sMs = slotMs(slotIndex, day);
  modalCtx = { pid, slotIndex, day, slotMs: sMs };
  const dayLabel = day === 'today' ? 'Today' : 'Tomorrow';
  document.getElementById('modal-title').textContent = pat.name;
  document.getElementById('modal-subtitle').textContent =
    `${dayLabel} · ${fmt(sMs)} – ${fmt(sMs + SLOT_MS)}`;

  const whoRow = document.getElementById('who-row');
  whoRow.innerHTML = USERS.map(u =>
    `<button class="who-btn ${currentUser === u ? 'active' : ''}" onclick="setUser('${u}');renderModalMeds()">${u}</button>`
  ).join('');

  renderModalMeds();
  document.getElementById('modal-overlay').classList.add('open');
}

window.renderModalMeds = function() {
  if (!modalCtx) return;
  const { pid, slotMs: atMs } = modalCtx;
  const pat = patients[pid];
  const list = document.getElementById('med-list');
  list.innerHTML = '';
  Object.entries(pat.meds).forEach(([medKey, med]) => {
    const st = medStatus(pid, medKey, atMs + SLOT_MS / 2);
    const available = st.s === 'available';
    const div = document.createElement('div');
    div.className = 'med-option' + (!available ? ' unavailable' : '');
    let statusHtml = '', statusClass = '';
    if (st.s === 'available')       { statusHtml = '✓ Available'; statusClass = 'ok'; }
    else if (st.s === 'cooling')    { statusHtml = `Next in ${fmtDuration(st.remaining)}`; statusClass = 'warn'; }
    else if (st.s === 'maxed')      { statusHtml = 'Max reached'; statusClass = 'bad'; }
    div.innerHTML = `
      <div>
        <div class="med-name" style="color:${med.color}">${med.name}</div>
        <div class="med-dose">${med.dose_ml}ml · every ${med.interval_hours}h</div>
      </div>
      <div class="med-status ${statusClass}">${statusHtml}</div>`;
    if (available) {
      div.addEventListener('click', () => logDose(pid, medKey));
    } else if (st.s === 'cooling') {
      div.addEventListener('click', () => {
        if (confirm(`${med.name} was given recently.\nNext dose: ${fmt(st.nextAvail)}\n\nGive anyway?`))
          logDose(pid, medKey, true);
      });
    } else if (st.s === 'maxed') {
      div.addEventListener('click', () => {
        if (confirm(`${med.name} has reached its daily max.\n\nGive anyway?`))
          logDose(pid, medKey, true);
      });
    }
    list.appendChild(div);
  });
};

window.closeModal = function(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  modalCtx = null;
};

// ─── DOSE DETAIL ─────────────────────────────────────────────────────────────
function openDoseDetail(pid, doseKey, dose) {
  doseCtx = { pid, doseKey, dose };
  const pat = patients[pid];
  const med = pat?.meds[dose.med];
  const canUndo = Date.now() - dose.time < 5 * 60 * 1000;
  document.getElementById('dose-info').innerHTML = `
    <div class="label">Patient</div><div class="value">${pat?.name || pid}</div>
    <div class="label">Medication</div><div class="value" style="color:${med?.color||'#fff'}">${med?.name || dose.med} — ${dose.dose_ml}ml</div>
    <div class="label">Time given</div><div class="value">${fmt(dose.time)}</div>
    <div class="label">Logged by</div><div class="value">${dose.logged_by || 'Unknown'}</div>`;
  const undoBtn = document.getElementById('undo-btn');
  undoBtn.disabled = !canUndo;
  document.getElementById('dose-modal-overlay').classList.add('open');
}

window.closeDoseModal = function(e) {
  if (e && e.target !== document.getElementById('dose-modal-overlay')) return;
  document.getElementById('dose-modal-overlay').classList.remove('open');
  doseCtx = null;
};

window.undoDose = async function() {
  if (!doseCtx) return;
  const { pid, doseKey } = doseCtx;
  await remove(ref(db, `doses/${pid}/${doseKey}`));
  showToast('Dose removed');
  closeDoseModal();
};

// ─── LOG DOSE ─────────────────────────────────────────────────────────────────
async function logDose(pid, medKey, override = false) {
  if (!currentUser) { document.getElementById('user-overlay').style.display = 'flex'; return; }
  const pat = patients[pid];
  const med = pat.meds[medKey];
  const time = modalCtx?.slotMs ? modalCtx.slotMs + SLOT_MS / 2 : Date.now();
  await push(ref(db, `doses/${pid}`), {
    med: medKey, time: Math.round(time), dose_ml: med.dose_ml,
    logged_by: currentUser, override: override || false,
  });
  document.getElementById('modal-overlay').classList.remove('open');
  modalCtx = null;
  showToast(`${med.name} ${med.dose_ml}ml logged`);
}

// ─── USER ─────────────────────────────────────────────────────────────────────
window.setUser = function(name) {
  currentUser = name;
  localStorage.setItem('sick-tracker-user', name);
  document.getElementById('user-overlay').style.display = 'none';
  document.querySelectorAll('.who-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
};

// ─── ADD PATIENT ──────────────────────────────────────────────────────────────
window.openAddPatient = function() {
  const name = prompt('Patient name:');
  if (!name) return;
  const pid = name.toLowerCase().replace(/\s+/g, '_');
  set(ref(db, `patients/${pid}`), {
    name, type: 'adult', active: true,
    meds: {
      tylenol: { name:'Tylenol', dose_ml:650, interval_hours:6, max_per_24h:4, color:'#7ee8a2' },
      motrin:  { name:'Motrin',  dose_ml:400, interval_hours:8, max_per_24h:3, color:'#f5a623' },
    }
  });
};

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── FIREBASE LISTENERS ───────────────────────────────────────────────────────
onValue(ref(db, 'patients'), snap => { patients = snap.val() || {}; render(); });
onValue(ref(db, 'doses'),    snap => { doses = snap.val() || {};    render(); });

// ─── SEED DATA ────────────────────────────────────────────────────────────────
get(ref(db, 'patients')).then(snap => {
  if (!snap.exists()) set(ref(db, 'patients'), INITIAL_PATIENTS);
});

// ─── WIDGET & INIT ────────────────────────────────────────────────────────────
if (widgetMode) document.body.classList.add('widget');
if (!currentUser) document.getElementById('user-overlay').style.display = 'flex';

setInterval(() => {
  updateNowLine();
  renderGrid._scrolled = true;
  renderGrid();
}, 60000);
</script>
</body>
</html>
